<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hastane Randevu Sistemi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-square">
        <div class="user-profile">
            <div class="user-avatar">👤</div>
            <div class="user-details">
                <h3>Ahmet Yılmaz</h3>
                <p><strong>Kan Grubu:</strong> A Rh (+)</p>
                <div class="stats">
                    <span><strong>Boy:</strong> 180 cm</span>
                    <span><strong>Kilo:</strong> 75 kg</span>
                    <span><strong>Yaş:</strong> 28</span>
                </div>
            </div>
        </div>

        <div class="header">
            <span class="hospital-icon">🏥</span>
            <h1>Hastane Portalı</h1>
            <p>Lütfen yapmak istediğiniz işlemi seçin.</p>
        </div>

        <div class="selection-area">
            <a href="appointment.html" class="action-box">
                <span class="icon">📅</span>
                <span>Randevu Al</span>
            </a>

            <a href="my-appointments.html" class="action-box">
                <span class="icon">📋</span>
                <span>Randevularım</span>
            </a>
        </div>
    </div>

    <script src="js/app.js"></script> 
</body>
</html>
