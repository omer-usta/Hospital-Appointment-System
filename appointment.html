<!DOCTYPE html>
<html lang="tr">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Randevu Al</title>
      <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
      <h1>Randevu Al</h1>
      <form id="appointmentForm">
       <div class="form-group">
            <label for="hospital">Hastane Seçin:</label>
             <select id="hospital" required>
                  <option value="">-- Lütfen Seçiniz --</option>
                  <option value="sehir-hastanesi">Şehir Hastanesi</option>
                  <option value="devlet-hastanesi">Devlet Hastanesi</option>
             </select>
       </div>
       <div class="form-group">
            <label for="department">Bölüm Seçin:</label>
             <select id="department" required>
                   <option value="">--Önce Hastane Seçiniz--</option>
                   <option value="kardiyoloji">Kardiyoloji</option>
                   <option value="goz">Göz Hastalıkları</option>
                   <option value="dahiliye">Dahiliye</option>
             </select>
       </div>
       <div class="form-group">
            <label for="doctor">Doktor Seçiniz:</label>
             <select id="doctor" required>
                   <option value="">--Önce Bölüm Seçiniz--</option>
                   <option value="dr-ahmet">Dr. Ahmet Yılmaz</option>
                   <option value="dr-ayse">DR. Ayşe Demir</option>
             </select>
       </div>
       <div class="form-group">
            <label for="appointmentDate">Tarih Seçiniz:</label>
                <input type="date" id="appointmentDate" required>
       </div>
      
              <button type="submit" class="submit-btn">Randevu Onayla</button>       
      </form>
      <div class="footer-links">
            <a href="index.html" class="back-link"> Ana Sayfaya Dön</a>
      </div>
</div>
       <script src="js/app.js"></script>
</body>
</html>
